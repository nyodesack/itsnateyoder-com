<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="NY emblem">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A2332"/>
      <stop offset="100%" stop-color="#101722"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#bg)"/>
  <rect x="12" y="12" width="232" height="232" rx="52" fill="none" stroke="#1DA1F2" stroke-width="8" opacity="0.95"/>
  <text x="44" y="176" font-family="Arial, Helvetica, sans-serif" font-size="156" font-weight="900" fill="#FFFFFF" filter="url(#shadow)">N</text>
  <text x="108" y="176" font-family="Arial, Helvetica, sans-serif" font-size="156" font-weight="900" fill="#1DA1F2" filter="url(#shadow)">Y</text>
</svg>
